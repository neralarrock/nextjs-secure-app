name: CodeQL

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  schedule:
    - cron: "19 3 * * 0"
  workflow_dispatch:

jobs:
  analyze:
    name: Analyze (${{ matrix.language }})
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    permissions:
      contents: read
      security-events: write
      actions: read
    strategy:
      fail-fast: false
      matrix:
        include:
          - language: javascript-typescript

    steps:
      - name: Checkout repository
        uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Initialize CodeQL
        uses: github/codeql-action/init@v4
        with:
          languages: ${{ matrix.language }}
          # Keep default query suite for stable SARIF output.
          queries: security-and-quality

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: "22"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Build project
        run: npm run build

      - name: Perform CodeQL Analysis
        uses: github/codeql-action/analyze@v4

      - name: Fail workflow when CodeQL finds alerts
        uses: actions/github-script@v7
        with:
          script: |
            const { owner, repo } = context.repo;
            const ref = context.ref;
            const response = await github.request(
              "GET /repos/{owner}/{repo}/code-scanning/alerts",
              {
                owner,
                repo,
                ref,
                tool_name: "CodeQL",
                state: "open",
                per_page: 100
              }
            );

            const alerts = response.data || [];
            core.info(`CodeQL open alerts on ${ref}: ${alerts.length}`);

            if (alerts.length > 0) {
              for (const alert of alerts.slice(0, 10)) {
                core.info(`- ${alert.rule?.id ?? "unknown-rule"}: ${alert.html_url}`);
              }
              core.setFailed(`CodeQL found ${alerts.length} open alert(s).`);
            }
